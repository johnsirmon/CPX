name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cpx-linux-x86_64
            binary_name: cpx
          - os: windows-latest
            artifact_name: cpx-windows-x86_64
            binary_name: cpx.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $pkg = cargo pkgid -p cpx-cli
          if ($pkg -notmatch '@(?<version>[0-9A-Za-z\.-\+]+)$') {
            throw "Could not determine cpx-cli version from cargo pkgid output: $pkg"
          }

          $workspaceVersion = $Matches.version

          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $releaseVersion = "${{ github.ref_name }}"
          } else {
            $releaseVersion = "v$workspaceVersion"
          }

          $packageDir = "${{ matrix.artifact_name }}-$releaseVersion"
          if ("${{ runner.os }}" -eq "Windows") {
            $archiveFile = "$packageDir.zip"
          } else {
            $archiveFile = "$packageDir.tar.gz"
          }

          "WORKSPACE_VERSION=$workspaceVersion" >> $env:GITHUB_ENV
          "RELEASE_VERSION=$releaseVersion" >> $env:GITHUB_ENV
          "PACKAGE_DIR=$packageDir" >> $env:GITHUB_ENV
          "ARCHIVE_FILE=$archiveFile" >> $env:GITHUB_ENV
          "workspace_version=$workspaceVersion" >> $env:GITHUB_OUTPUT
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT
          "package_dir=$packageDir" >> $env:GITHUB_OUTPUT
          "archive_file=$archiveFile" >> $env:GITHUB_OUTPUT

      - name: Validate tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expectedTag = "v$env:WORKSPACE_VERSION"
          if ($env:RELEASE_VERSION -ne $expectedTag) {
            throw "Release tag $env:RELEASE_VERSION does not match workspace version $expectedTag"
          }

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p cpx-cli

      - name: Stage Linux package contents
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$PACKAGE_DIR"
          cp "target/release/${{ matrix.binary_name }}" "$PACKAGE_DIR/"
          cp README.md "$PACKAGE_DIR/README.md"
          cp docs/install-and-use.md "$PACKAGE_DIR/install-and-use.md"
          printf '%s\n' "$RELEASE_VERSION" > "$PACKAGE_DIR/VERSION.txt"

      - name: Stage Windows package contents
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:PACKAGE_DIR" | Out-Null
          Copy-Item "target\release\${{ matrix.binary_name }}" "$env:PACKAGE_DIR\${{ matrix.binary_name }}"
          Copy-Item README.md "$env:PACKAGE_DIR\README.md"
          Copy-Item docs\install-and-use.md "$env:PACKAGE_DIR\install-and-use.md"
          Set-Content -Path "$env:PACKAGE_DIR\VERSION.txt" -Value $env:RELEASE_VERSION

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: tar -czf "$ARCHIVE_FILE" "$PACKAGE_DIR"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "$env:PACKAGE_DIR" -DestinationPath "$env:ARCHIVE_FILE"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.package_dir }}
          path: ${{ steps.release_meta.outputs.archive_file }}

      - name: Publish release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_version }}
          files: ${{ steps.release_meta.outputs.archive_file }}
          fail_on_unmatched_files: true
          generate_release_notes: true
